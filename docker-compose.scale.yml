# docker-compose.scale.yml
#
# Phase 4 — Multi-VPS horizontal scale template.
#
# Run this on VPS-2, VPS-3, etc. (NOT on VPS-1 which runs the API + first shards).
# All VPSes share the SAME Redis and Postgres on VPS-1.
# Just increase TOTAL_SHARDS and assign each VPS a unique block of SHARD_IDs.
#
# Example: 16 000 devices across 4 VPSes (8 shards total, 2 000 devices/shard)
#
#  VPS-1: API + worker-0 + worker-1  (TOTAL_SHARDS=8, SHARD_ID=0,1)
#  VPS-2: worker-2 + worker-3        (TOTAL_SHARDS=8, SHARD_ID=2,3)
#  VPS-3: worker-4 + worker-5        (TOTAL_SHARDS=8, SHARD_ID=4,5)
#  VPS-4: worker-6 + worker-7        (TOTAL_SHARDS=8, SHARD_ID=6,7)
#
# Usage on VPS-2:
#   docker build -t watether-backend:latest .  (or pull from registry)
#   TOTAL_SHARDS=8 FIRST_SHARD=2 docker compose -f docker-compose.scale.yml up -d
#
# Requirements:
#   /opt/watether/.env.production  (same file as VPS-1, just copied over)
#   Redis and Postgres reachable from this VPS (adjust REDIS_HOST / DATABASE_URL in .env)

services:
  worker-a:
    image: watether-backend:latest
    container_name: watether_worker_a
    restart: unless-stopped
    network_mode: host
    env_file:
      - /opt/watether/.env.production
    environment:
      NODE_ENV: production
      WORKER_PORT: 3100
      SHARD_ID: "${FIRST_SHARD:-2}"
      TOTAL_SHARDS: "${TOTAL_SHARDS:-8}"
    command: ["sh", "-c", "node dist/src/worker.js"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  worker-b:
    image: watether-backend:latest
    container_name: watether_worker_b
    restart: unless-stopped
    network_mode: host
    env_file:
      - /opt/watether/.env.production
    environment:
      NODE_ENV: production
      WORKER_PORT: 3101
      SHARD_ID: "${SECOND_SHARD:-3}"
      TOTAL_SHARDS: "${TOTAL_SHARDS:-8}"
    command: ["sh", "-c", "node dist/src/worker.js"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 194.233.67.65
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 18m
          script_stop: true
          envs: LEMONSQUEEZY_API_KEY,LEMONSQUEEZY_WEBHOOK_SECRET
          script: |
            set -e
            echo "[bootstrap] start $(date)"
            APP_DIR=/opt/watether
            mkdir -p $APP_DIR
            cd $APP_DIR
            echo "[bootstrap] cwd=$(pwd), .git=$([ -d .git ] && echo yes || echo no)"
            [ -d .git ] || git init
            git remote add origin git@github.com:aseprahman04/watheter.git 2>/dev/null || git remote set-url origin git@github.com:aseprahman04/watheter.git
            echo "[bootstrap] remote=$(git remote get-url origin)"
            echo "[bootstrap] fetching..."
            export GIT_SSH_COMMAND="ssh -i /root/.ssh/watether_deploy -o StrictHostKeyChecking=no"
            git fetch origin main
            echo "[bootstrap] resetting to FETCH_HEAD"
            git reset --hard FETCH_HEAD
            # Patch secrets into .env.production from GitHub Secrets
            if [ -n "$LEMONSQUEEZY_API_KEY" ]; then
              sed -i "s|^LEMONSQUEEZY_API_KEY=.*|LEMONSQUEEZY_API_KEY=$LEMONSQUEEZY_API_KEY|" /opt/watether/.env.production || echo "LEMONSQUEEZY_API_KEY=$LEMONSQUEEZY_API_KEY" >> /opt/watether/.env.production
            fi
            if [ -n "$LEMONSQUEEZY_WEBHOOK_SECRET" ]; then
              sed -i "s|^LEMONSQUEEZY_WEBHOOK_SECRET=.*|LEMONSQUEEZY_WEBHOOK_SECRET=$LEMONSQUEEZY_WEBHOOK_SECRET|" /opt/watether/.env.production || echo "LEMONSQUEEZY_WEBHOOK_SECRET=$LEMONSQUEEZY_WEBHOOK_SECRET" >> /opt/watether/.env.production
            fi
            echo "[bootstrap] done, running deploy.sh"
            bash /opt/watether/scripts/deploy.sh

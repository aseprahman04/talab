services:
  backend:
    image: talab-backend:latest
    container_name: talab_backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - /opt/talab/.env.production
    environment:
      NODE_ENV: production
      PORT: 3009
      GOOGLE_CALLBACK_URL: https://talab.app/api/auth/google/callback
    command: ["sh", "-c", "npx prisma@5 db push --accept-data-loss && node dist/src/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3009/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Device Worker ─────────────────────────────────────────────────────────────
  # Initial deploy: single worker, no sharding (TOTAL_SHARDS=1).
  # WhatsApp sessions live here — restart this worker to reconnect all devices.
  #
  # TO SCALE: increase TOTAL_SHARDS and add worker-1..N-1 services below.
  # Each shard handles ~(total_devices / N) WA sessions.
  # Example: 4 shards × 500 devices = 2 000 devices on one VPS.
  # See docker-compose.scale.yml for multi-VPS setup.
  #
  # CHECKLIST before adding more shards:
  # 1. Verify this single worker handles sends + inbound correctly (e2e tests)
  # 2. Confirm VPS has enough RAM (~300 MB per worker process)
  # 3. Add worker-1, worker-2, worker-3 services below with TOTAL_SHARDS=4
  #    and SHARD_ID=1,2,3 respectively

  worker-0:
    image: talab-backend:latest
    container_name: talab_worker_0
    restart: unless-stopped
    network_mode: host
    env_file:
      - /opt/talab/.env.production
    environment:
      NODE_ENV: production
      WORKER_PORT: 3100
      SHARD_ID: "0"
      TOTAL_SHARDS: "1"
    command: ["sh", "-c", "sleep 15 && node dist/src/worker.js"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Uncomment below when ready to scale to 4 shards (2 000 devices) ──────────
  # worker-1:
  #   image: talab-backend:latest
  #   container_name: talab_worker_1
  #   restart: unless-stopped
  #   network_mode: host
  #   env_file: [/opt/talab/.env.production]
  #   environment:
  #     NODE_ENV: production
  #     WORKER_PORT: 3101
  #     SHARD_ID: "1"
  #     TOTAL_SHARDS: "4"
  #   command: ["sh", "-c", "sleep 15 && node dist/src/worker.js"]
  #   logging: { driver: json-file, options: { max-size: "20m", max-file: "5" } }
  #
  # worker-2:
  #   ... (SHARD_ID: "2", WORKER_PORT: 3102)
  #
  # worker-3:
  #   ... (SHARD_ID: "3", WORKER_PORT: 3103)
  # ─────────────────────────────────────────────────────────────────────────────
  # NOTE: when enabling shards 1-3, also change worker-0 TOTAL_SHARDS to "4"
